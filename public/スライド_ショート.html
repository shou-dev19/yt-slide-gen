<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イオンモバイル徹底レビュー - Export Safe Version</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Noto+Color+Emoji&display=swap"
        rel="stylesheet">
    <style>
        /* 1. RESET & BASIC SETUP */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            font-family: 'Noto Sans JP', 'Noto Color Emoji', sans-serif;
            color: #333;
        }

        /* 2. SLIDE CONTAINER */
        /* エクスポート互換性のため、背景画像をコンテナに直接設定するか、単色の背景色を明示 */
        .slide-container {
            width: 1280px;
            height: 720px;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            /* Flexboxは多くのツールでサポートされつつある */
            justify-content: center;
            align-items: center;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        /* 3. CONTENT AREA (1:1 Ratio) */
        .shorts-content {
            width: 720px;
            height: 720px;
            position: relative;
            z-index: 10;
            /* 最前面を保証 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.0);
            /* 透明度を明示 */
        }

        /* 4. TYPOGRAPHY & ELEMENTS */
        h2 {
            font-size: 50px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .main-text {
            font-size: 80px;
            line-height: 1.2;
            margin-bottom: 20px;
            background: #fff;
            padding: 20px 40px;
            border-radius: 20px;
            border: 8px solid #0055AA;
            color: #333;
            font-weight: 900;
            /* 影はエクスポートで消える可能性があるが、装飾として残す */
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.1);
        }

        .sub-text {
            font-size: 40px;
            color: #333;
            font-weight: 700;
            background: #eee;
            padding: 10px 30px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
        }

        /* ランク表示のスタイル */
        .rank-badge {
            font-size: 200px;
            font-weight: 900;
            color: #fff;
            background-color: #0055AA;
            width: 350px;
            height: 350px;
            line-height: 350px;
            /* 縦中央揃え対策 */
            border-radius: 50%;
            text-align: center;
            border: 15px solid #fff;
            margin: 20px auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        /* アイコンの代替として絵文字を使用 (フォントサイズ調整) */
        .emoji-icon {
            font-size: 150px;
            line-height: 1;
            margin-bottom: 20px;
            display: block;
        }

        /* 画像プレースホルダー */
        .img-box {
            width: 600px;
            height: 350px;
            background-color: #ddd;
            border: 4px dashed #999;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 吹き出し (CSS三角形はエクスポートで消えやすいので、ボーダーボックスのみにする) */
        .speech-box {
            background: #0055AA;
            color: #fff;
            padding: 20px 40px;
            font-size: 40px;
            border-radius: 20px;
            margin-top: 20px;
            border: 5px solid #fff;
        }

        /* 色のユーティリティ */
        .text-red {
            color: #FF4500;
            border-color: #FF4500;
        }

        .text-gold {
            color: #DAA520;
        }

        .bg-gold {
            background: linear-gradient(135deg, #FFD700, #DAA520);
        }

        /* 背景装飾 (position absoluteを使用するが、z-indexを-1にする) */
        .bg-deco {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* コンテンツより後ろ */
            opacity: 0.2;
        }
    </style>
</head>

<body>

    <!-- Slide 1: タイトル -->
    <div class="slide-container" style="background-color: #ffe0d0;">
        <!-- コンテンツが最前面に来るように z-index を管理 -->
        <div class="shorts-content" style="z-index: 2;">
            <h2>\ 契約前に絶対見て！ /</h2>
            <div class="main-text text-red" style="font-size: 70px;">
                <img src="images/logo/aeonmobile_logo.png" alt="イオンモバイル"
                    style="height: 1.2em; vertical-align: bottom;"><br>徹底レビュー
            </div>
            <div class="emoji-icon">🔥</div>
        </div>
    </div>

    <!-- Slide 2: 総合評価 -->
    <div class="slide-container" style="background-color: #f0f8ff;">
        <div class="shorts-content" style="z-index: 2;">
            <div class="sub-text" style="background:none; font-size: 60px;">総合評価</div>
            <div class="rank-badge">A</div>

            <!-- スタンプ風テキスト -->
            <div style=" background: #FF4500; color: #fff; padding: 15px 30px; font-size: 40px; font-weight: 900;
                border: 5px solid #fff; transform: rotate(-5deg); margin-top: -50px; z-index: 10;">
                条件次第で SS!?
            </div>
        </div>
    </div>

    <!-- Slide 3: 通信品質 (注意) -->
    <div class="slide-container" style="background-color: #fff0f0;">
        <div class="shorts-content" style="z-index: 2;">
            <div class="img-box">
                <!-- 外部画像を使用 -->
                <img src="images/common/格安SIMを車の道路で例えたイラスト.png" alt="混雑イメージ">
            </div>

            <div class="main-text" style="font-size: 60px; border-color: #555; color: #555;">
                通信品質：B
            </div>
            <div class="sub-text" style="color: #d9534f; background:#fff;">
                ⚠️ 昼は遅いかも…
            </div>
        </div>
    </div>

    <!-- Slide 4: 通話料 (Sランク) -->
    <div class="slide-container" style="background-color: #f0faff;">
        <div class="shorts-content" style="z-index: 2;">
            <div class="emoji-icon">📞</div>

            <div class="main-text" style="font-size: 60px;">
                通話料：<span class="text-gold">S</span>
            </div>

            <div class="speech-box">
                アプリ不要で<br>勝手に半額！
            </div>
        </div>
    </div>

    <!-- Slide 5: 店舗サポート (Sランク) -->
    <div class="slide-container" style="background-color: #fffaf0;">
        <div class="shorts-content" style="z-index: 2;">
            <div class="img-box" style="height: 400px;">
                <img src="images/irasutoya/pasokon_kyoushitsu_smartphone.png" alt="シニア夫婦">
            </div>

            <div class="main-text" style="font-size: 55px;">
                店舗サポート：<span class="text-gold">S</span>
            </div>

            <div class="sub-text">
                🏪 全国のイオンで相談可
            </div>
        </div>
    </div>

    <!-- Slide 6: 料金 (衝撃) -->
    <div class="slide-container" style="background-color: #ffffff;">
        <div class="shorts-content" style="z-index: 2;">
            <div class="img-box" style="border: none; background: transparent; height: 250px;">
                <img src="images/irasutoya/family_happy_banzai.png" alt="家族" style="object-fit: contain;">
            </div>

            <h3 class="sub-text" style="margin-bottom: 20px;">家族シェアなら…</h3>

            <div class="main-text text-red" style="font-size: 90px; color: #FF4500;">
                月800円!?
            </div>
        </div>
    </div>

    <!-- Slide 7: リアクション -->
    <div class="slide-container" style="background: radial-gradient(circle, #fff 20%, #ffeb3b 100%);">
        <div class="shorts-content" style="z-index: 2;">
            <div class="emoji-icon" style="font-size: 200px;">😲</div>
            <div class="main-text" style="font-size: 80px; transform: rotate(-5deg);">
                安すぎ…！？
            </div>
        </div>
    </div>

    <!-- Slide 8: 誘導 -->
    <div class="slide-container" style="background-color: #f8f9fa;">
        <div class="shorts-content" style="z-index: 2;">
            <div class="img-box">
                <img src="images/thumbnails/【月額800円〜】家族4人で乗り換えると衝撃の安さに！イオンモバイルの料金プランと5つのメリットを徹底解説.png" alt="家族"
                    style="object-fit: contain;">
            </div>

            <div class="main-text" style="font-size: 50px;">
                続きは本編で解説！
            </div>

            <div class="emoji-icon" style="font-size: 80px; color: #FF4500;">🔻</div>
            <p style="font-size: 24px; font-weight: 700;">下のリンクをタップ！</p>
        </div>
    </div>

</body>

</html>
