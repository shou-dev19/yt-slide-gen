<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Shorts Slides - 格安SIM 2枚持ち</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0052cc;
            --primary-red: #e63946;
            --accent-yellow: #ffe600;
            --bg-light: #f0f4f8;
            --text-dark: #1a1a1a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }

        .slide-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--white);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 60px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Slide 1: Thumbnail */
        #slide-1 {
            background: repeating-radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f7ff 10%, #e6f0ff 20%);
            border: 25px solid var(--primary-blue);
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .thumbnail-title-wrapper {
            transform: rotate(-3deg);
            z-index: 2;
        }

        .thumbnail-main-text {
            font-size: 110px;
            font-weight: 900;
            color: var(--white);
            background-color: var(--primary-red);
            padding: 20px 40px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.2);
            line-height: 1.2;
        }

        .thumbnail-sub-text {
            font-size: 80px;
            font-weight: 900;
            color: var(--text-dark);
            background-color: var(--accent-yellow);
            padding: 15px 30px;
            display: inline-block;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        /* Standard Explanation Slides */
        .explanation-slide {
            padding: 80px;
            justify-content: flex-start;
        }

        .big-number {
            position: absolute;
            top: 20px;
            left: 40px;
            font-size: 300px;
            font-weight: 900;
            color: var(--primary-blue);
            opacity: 0.1;
            z-index: 0;
            line-height: 1;
        }

        .slide-title {
            font-size: 80px;
            font-weight: 900;
            color: var(--primary-blue);
            border-bottom: 12px solid var(--primary-blue);
            padding-bottom: 20px;
            margin-bottom: 80px;
            position: relative;
            z-index: 1;
            width: fit-content;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .highlight-text {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.4;
            color: var(--text-dark);
        }

        .highlight-text span.blue { color: var(--primary-blue); }
        .highlight-text span.red { color: var(--primary-red); font-size: 90px; }

        .list-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .list-emoji {
            font-size: 80px;
            margin-right: 30px;
            flex-shrink: 0;
            color: var(--primary-blue);
        }

        /* Slide 6: CTA */
        #slide-6 {
            background: linear-gradient(135deg, #0052cc, #003380);
            color: var(--white);
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px;
        }

        .cta-text {
            font-size: 80px;
            font-weight: 900;
            color: var(--accent-yellow);
            margin-bottom: 20px;
            text-shadow: 4px 4px 0px rgba(0,0,0,0.3);
        }

        .bounce-arrow {
            font-size: 120px;
            margin-bottom: 40px;
            animation: bounce 1.5s infinite;
            color: var(--accent-yellow);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(30px); }
        }

        /* Image Placeholders */
        .image-placeholder {
            background-color: #e6f0ff;
            border: 6px dashed var(--primary-blue);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 32px;
            padding: 40px;
            text-align: center;
            width: 100%;
            height: 400px;
            margin-top: 40px;
        }

        .image-placeholder span {
            font-size: 100px;
            margin-bottom: 20px;
        }

        img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.15));
        }

        .thumbnail-img-container {
            width: 100%;
            height: 350px;
            margin-top: 140px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

    </style>
</head>
<body>

    <!-- SLIDE 1: Thumbnail -->
    <div class="slide-container" id="slide-1">
        <div class="thumbnail-title-wrapper">
            <div class="thumbnail-main-text">格安SIMは1枚より<br>2枚持ちが最強！</div><br>
            <div class="thumbnail-sub-text">月1,298円で実質使い放題</div>
        </div>
        <div class="thumbnail-img-container">
            <img src="public/images/irasutoya/animal_buta_shock.png" alt="驚くキャラ">
        </div>
    </div>

    <!-- SLIDE 2: Intro -->
    <div class="slide-container explanation-slide" id="slide-2">
        <div class="big-number">01</div>
        <div class="slide-title">2枚持ちの方がお得？</div>
        <div class="content-area">
            <div class="highlight-text">
                え！？<br>
                1枚より<span class="red">2枚</span>の方が<br>
                <span class="blue">安くて安心</span>なの！？
            </div>
            <div style="display: flex; justify-content: center; margin-top: 40px;">
                <img src="public/images/irasutoya/businessman2_kangaechu.png" alt="考える人" style="height: 350px;">
            </div>
        </div>
    </div>

    <!-- SLIDE 3: Benefit 1 -->
    <div class="slide-container explanation-slide" id="slide-3">
        <div class="big-number">02</div>
        <div class="slide-title">①通信障害対策</div>
        <div class="content-area">
            <div class="list-item">
                <div class="list-emoji"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="highlight-text">
                    1社が止まっても<br>
                    <span class="blue">もう1枚でカバー！</span>
                </div>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 10px;">
                <img src="public/images/common/複数回線持ちで通信障害対策.png" alt="通信障害イメージ">
            </div>
        </div>
    </div>

    <!-- SLIDE 4: Benefit 2 -->
    <div class="slide-container explanation-slide" id="slide-4">
        <div class="big-number">03</div>
        <div class="slide-title">②各社の良いとこ取り</div>
        <div class="content-area">
            <div class="list-item">
                <div class="list-emoji"><i class="fa-solid fa-scissors"></i></div>
                <div class="highlight-text">
                    <span class="blue">通話</span>と<span class="blue">データ</span>を<br>
                    役割分担させる！
                </div>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 10px;">
                <img src="public/images/common/複数回線を組み合わせるイメージ図.png" alt="役割分担イメージ">
            </div>
        </div>
    </div>

    <!-- SLIDE 5: Benefit 3 -->
    <div class="slide-container explanation-slide" id="slide-5">
        <div class="big-number">04</div>
        <div class="slide-title">③コスト削減！</div>
        <div class="content-area">
            <div class="highlight-text" style="font-size: 60px;">
                mineo(<span class="blue">1298円</span>) + povo2.0(<span class="blue">0円</span>)<br>
                <div style="font-size: 80px; margin-top: 30px;">
                    ＝月<span class="red">1298円</span>で<br>実質使い放題！
                </div>
            </div>
            <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 60px;">
                <img src="public/images/logo/Mineo_logo.jpg" alt="mineo" style="height: 200px;">
                <div style="font-size: 80px; font-weight: 900; color: var(--primary-blue);">+</div>
                <img src="public/images/logo/Povo_logo.png" alt="povo" style="height: 200px;">
            </div>
        </div>
    </div>

    <!-- SLIDE 6: CTA -->
    <div class="slide-container" id="slide-6">
        <div class="cta-text">おすすめ組み合わせ3選は<br>本編動画でチェック！</div>
        <div class="bounce-arrow"><i class="fa-solid fa-circle-arrow-down"></i></div>
        <div style="width: 90%; height: 500px; background-color: white; border: 15px solid var(--accent-yellow); border-radius: 20px; overflow: hidden; display: flex; justify-content: center; align-items: center;">
            <img src="public/images/thumbnails/【2026年最新】最強の2枚持ちおすすめ格安SIM組み合わせ3選！_サムネ1.png" alt="本編サムネイル" style="width: 100%; height: 100%; object-fit: cover; filter: none;">
        </div>
    </div>

</body>
</html>
