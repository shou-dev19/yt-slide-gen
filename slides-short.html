<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ahamo解説スライド (ショート動画用)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;900&family=Noto+Color+Emoji&display=swap"
        rel="stylesheet">
    <style>
        /* CSS Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', 'Noto Color Emoji', sans-serif;
            background-color: #f0f4f8;
            /* スライド外の背景色 */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 30px;
        }

        /* 1:1 Aspect Ratio Slide container */
        .slide {
            width: 1080px;
            height: 1080px;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            color: #0d3b66;
            /* 濃い青色で信頼感を演出 */
        }

        /* 共通コンポーネント */
        .image-placeholder {
            background-color: #e6f0ff;
            border: 6px dashed #0052cc;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 700;
            color: #0052cc;
            text-align: center;
            line-height: 1.5;
        }

        .slide-title {
            font-size: 80px;
            font-weight: 900;
            margin-bottom: 50px;
            text-align: center;
            width: 100%;
            color: #0052cc;
            border-bottom: 10px solid #0052cc;
            padding-bottom: 20px;
        }

        .big-number {
            font-size: 150px;
            font-weight: 900;
            color: #0052cc;
            position: absolute;
            top: 40px;
            left: 60px;
            opacity: 0.2;
        }

        .highlight-text {
            font-size: 80px;
            font-weight: 900;
            text-align: center;
            line-height: 1.4;
            color: #333;
        }

        .blue {
            color: #0052cc;
            font-size: 100px;
        }

        .red {
            color: #e63946;
            font-size: 100px;
        }

        .flex-row {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            gap: 40px;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 100%;
        }

        /* 個別スライド専用スタイル */
        /* Slide 1 (Thumbnail Style) */
        #slide1 {
            background: repeating-radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f7ff 10%, #e6f0ff 20%);
            border: 25px solid #0052cc;
            padding: 40px;
            justify-content: flex-start;
        }

        #slide1 .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 10px;
            height: 180px;
            /* ahamoロゴを巨大に表示するスペース */
        }

        #slide1 .logo-container img {
            width: 90%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.15));
        }

        #slide1 .catchphrase {
            font-size: 130px;
            font-weight: 900;
            color: #ffffff;
            background: #e63946;
            padding: 10px 60px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 0 #b3001b, 0 25px 30px rgba(0, 0, 0, 0.3);
            transform: rotate(-3deg);
            z-index: 10;
            margin-bottom: 35px;
            letter-spacing: 5px;
            border: 10px solid #ffffff;
        }

        #slide1 .sub-catch {
            font-size: 55px;
            font-weight: 900;
            color: #0052cc;
            background: #ffe600;
            /* YouTubeで目を引く黄色 */
            padding: 10px 50px;
            border: 8px solid #0052cc;
            border-radius: 50px;
            z-index: 10;
            transform: rotate(2deg);
            box-shadow: 0 10px 0 #0052cc, 0 15px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;
        }

        #slide1 .illustration-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
        }

        #slide1 .illustration-container img {
            height: 420px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.25));
        }

        /* Slide 2 */
        #slide2 .list-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            align-items: center;
        }

        #slide2 .list-item {
            font-size: 70px;
            font-weight: 800;
            background-color: #f0f7ff;
            padding: 30px 50px;
            border-radius: 20px;
            border-left: 20px solid #0052cc;
            width: 90%;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        #slide2 .icon {
            font-size: 80px;
            margin-right: 40px;
        }

        /* Slide 7 */
        #slide7 .warning-box {
            background-color: #fff0f0;
            border: 10px solid #e63946;
            border-radius: 30px;
            padding: 60px;
            text-align: center;
            width: 100%;
        }

        #slide7 .warning-title {
            font-size: 100px;
            font-weight: 900;
            color: #e63946;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        /* Slide 8 */
        #slide8 .cta-box {
            background: linear-gradient(135deg, #0052cc, #003380);
            color: white;
            width: 100%;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 82, 204, 0.4);
        }

        #slide8 .cta-text {
            font-size: 70px;
            font-weight: 900;
            margin-bottom: 20px;
        }

        #slide8 .floating-arrow {
            font-size: 110px;
            margin-top: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(40px);
            }

            60% {
                transform: translateY(20px);
            }
        }
    </style>
</head>

<body>

    <!-- スライドID: 1 -->
    <div class="slide" id="slide1">
        <div class="logo-container">
            <img src="public/images/logo/Ahamo_logo.png" alt="ahamo logo">
        </div>
        <div class="catchphrase">徹底解説</div>
        <div class="sub-catch">迷ってる人、絶対見て！</div>
        <div class="illustration-container">
            <img src="public/images/irasutoya/pose_atama_kakaeru_woman.png" alt="悩む女性">
        </div>
    </div>

    <!-- スライドID: 2 -->
    <div class="slide" id="slide2">
        <div class="slide-title">ahamoがおすすめな人</div>
        <div class="list-container">
            <div class="list-item"><span class="icon">🚀</span>通信速度を重視</div>
            <div class="list-item"><span class="icon">💾</span>データ大容量</div>
            <div class="list-item"><span class="icon">📞</span>短い通話が多い</div>
            <div class="list-item"><span class="icon">✈️</span>海外旅行好き</div>
        </div>
    </div>

    <!-- スライドID: 3 -->
    <div class="slide" id="slide3">
        <div class="big-number">01</div>
        <div class="slide-title">お昼も爆速！</div>
        <div class="flex-col">
            <div class="highlight-text">ドコモ本家と<br><span class="blue">同じ品質！</span></div>
            <img src="public/images/common/ahamoが道路をスムーズに走るイメージ図.png" alt="高速通信イメージ"
                style="width: 80%; height: 400px; object-fit: contain; margin-top: 20px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- スライドID: 4 -->
    <div class="slide" id="slide4">
        <div class="big-number">02</div>
        <div class="slide-title">大容量で格安</div>
        <div class="flex-row">
            <div class="highlight-text"><span class="blue">30</span><br>GB</div>
            <div class="highlight-text" style="font-size:60px;">たったの<br><span class="red">2,970</span>円<br><span
                    style="font-size:40px;">(税込)</span></div>
        </div>
        <img src="public/images/temp/ahamoはドコモの半額以下イラスト.png" alt="他社との料金比較グラフ"
            style="width:90%; height:350px; margin-top:50px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
    </div>

    <!-- スライドID: 5 -->
    <div class="slide" id="slide5">
        <div class="big-number">03</div>
        <div class="slide-title">通話も無料！</div>
        <div class="flex-col">
            <div class="highlight-text"><span class="blue">5分以内</span>の<br>国内通話が…</div>
            <div class="highlight-text"><span class="red">0円！</span><br><span style="font-size:50px;">(最初から込み)</span>
            </div>
            <div class="flex-row" style="width: 80%; margin-top: 20px;">
                <img src="public/images/irasutoya/smartphone_talk03_man.png" alt="スマホで話す男性"
                    style="height: 250px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
                <img src="public/images/irasutoya/smartphone_talk08_woman.png" alt="スマホで話す女性"
                    style="height: 250px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
            </div>
        </div>
    </div>

    <!-- スライドID: 6 -->
    <div class="slide" id="slide6">
        <div class="big-number">04</div>
        <div class="slide-title">海外でもそのまま</div>
        <div class="flex-col" style="width: 100%;">
            <div class="highlight-text" style="font-size: 70px;">設定を<span class="blue">オン</span>にするだけ！<br>追加料金<span
                    class="red">なし</span></div>
            <img src="public/images/common/データローミング設定イメージ_iphoneのみ.png" alt="データローミング設定イメージ"
                style="width: 100%; height: 450px; object-fit: contain; margin-top: 20px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- スライドID: 7 -->
    <div class="slide" id="slide7">
        <div class="warning-box">
            <div class="warning-title">⚠️ 注意！</div>
            <div class="highlight-text" style="font-size:70px; margin-bottom: 30px;">契約前に絶対知るべき</div>
            <div class="highlight-text"
                style="color: #e63946; font-size:100px; border-bottom: 10px solid #e63946; display:inline-block; padding-bottom: 10px;">
                致命的デメリット</div>
        </div>
        <img src="public/images/irasutoya/animal_buta_shock.png" alt="ショックを受ける豚"
            style="margin-top:60px; width: 80%; height: 350px; object-fit: contain; filter: drop-shadow(0 15px 25px rgba(230, 57, 70, 0.2));">
    </div>

    <!-- スライドID: 8 -->
    <div class="slide" id="slide8">
        <div class="cta-box">
            <div class="cta-text">デメリットの詳細は…</div>
            <div class="cta-text" style="color:#ffd700; font-size:100px;">本編で解説！</div>
            <div class="floating-arrow">👇</div>
        </div>
        <img src="public/images/thumbnails/【あなたはどっち？】ahamoで得する人・損する人の違いを分かりやすく解説します！_サムネ.png" alt="本編動画サムネイル"
            style="width:90%; height:380px; margin-top:40px; object-fit: contain; border-radius: 20px; box-shadow: 0 15px 30px rgba(0, 82, 204, 0.3); border: 10px solid #0052cc;">
    </div>

</body>

</html>
