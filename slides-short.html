<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>YouTube Shorts Slides</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue: #0052cc;
            --white: #ffffff;
            --red: #e63946;
            --yellow: #ffd700;
            --bg-color: #f0f4f8;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-weight: 900;
        }

        .slide {
            width: 1080px;
            height: 1080px;
            background-color: var(--white);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Thumbnail Slide */
        .slide-thumbnail {
            background: repeating-radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f7ff 10%, #e6f0ff 20%);
            border: 25px solid var(--blue);
            align-items: center;
            justify-content: flex-start;
            padding-top: 80px;
        }

        .slide-thumbnail .logo {
            height: 180px;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-thumbnail .catchphrase {
            transform: rotate(-3deg);
            color: var(--white);
            background-color: var(--red);
            font-size: 80px;
            padding: 30px 50px;
            margin-top: 50px;
            text-align: center;
            text-shadow: 5px 5px 0px rgba(0, 0, 0, 0.5);
            box-shadow: 15px 15px 0px rgba(0, 0, 0, 0.8);
            line-height: 1.3;
        }

        /* Standard Slides */
        .slide-standard {
            padding: 80px;
        }

        .big-number {
            position: absolute;
            top: 30px;
            left: 40px;
            font-size: 250px;
            color: var(--blue);
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            line-height: 1;
            margin: 0;
        }

        .slide-title {
            font-size: 80px;
            color: var(--blue);
            border-bottom: 15px solid var(--blue);
            padding-bottom: 20px;
            margin-bottom: 50px;
            z-index: 1;
            position: relative;
            line-height: 1.2;
        }

        .highlight-text {
            font-size: 65px;
            line-height: 1.5;
            z-index: 1;
            position: relative;
        }

        .highlight-text span.red {
            color: var(--red);
            font-size: 90px;
            display: inline-block;
        }

        .highlight-text span.blue {
            color: var(--blue);
            font-size: 90px;
            display: inline-block;
        }

        /* Warning Slide */
        .slide-warning {
            background-color: #fff0f0;
            border: 25px solid var(--red);
            padding: 80px;
            align-items: center;
            justify-content: center;
        }

        .warning-box {
            background-color: var(--white);
            border: 15px solid var(--red);
            padding: 50px;
            text-align: center;
            width: 85%;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .warning-title {
            color: var(--red);
            font-size: 90px;
            margin-bottom: 40px;
            line-height: 1.2;
        }

        .warning-text {
            font-size: 70px;
            line-height: 1.5;
        }

        /* CTA Slide */
        .slide-cta {
            background: linear-gradient(135deg, #0052cc, #003380);
            color: var(--white);
            align-items: center;
            justify-content: center;
            padding: 80px;
        }

        .cta-title {
            color: var(--yellow);
            font-size: 110px;
            text-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
            margin-bottom: 50px;
            line-height: 1.2;
        }

        .cta-text {
            font-size: 65px;
            text-align: center;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-40px);
            }

            60% {
                transform: translateY(-20px);
            }
        }

        .arrow-down {
            font-size: 120px;
            color: var(--yellow);
            animation: bounce 2s infinite;
            margin-bottom: 25px;
        }

        /* Placeholders */
        .placeholder {
            background-color: #e6f0ff;
            border: 8px dashed var(--blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            font-size: 45px;
            text-align: center;
            border-radius: 30px;
            margin-top: auto;
            flex-grow: 1;
            margin-bottom: 20px;
            width: 100%;
            padding: 30px;
            box-sizing: border-box;
            font-weight: 700;
        }

        .placeholder.cta-placeholder {
            border: 12px solid var(--white);
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--white);
            height: 450px;
            flex-grow: 0;
            width: 85%;
        }

        .logo-placeholder {
            width: 400px;
            height: 120px;
            font-size: 35px;
            border: 6px dashed var(--blue);
            background-color: #e6f0ff;
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            font-weight: 700;
        }

        img.replaced {
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.15));
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>

<body>

    <!-- Slide 1: Thumbnail -->
    <div class="slide slide-thumbnail" id="slide-1">
        <div class="logo" style="height: 250px;">
            <img src="public/images/logo/Y!mobile.png" alt="ワイモバイルロゴ" class="replaced"
                style="height: 100%; object-fit: contain;">
        </div>
        <div class="catchphrase">
            絶対契約しちゃ<br>ダメな人！
        </div>
        <div
            style="margin-top: 60px; width: 85%; display: flex; justify-content: center; flex-grow: 1; margin-bottom: 20px;">
            <img src="public/images/irasutoya/mark_chuui.png" alt="注意マーク" class="replaced" style="max-height: 250px;">
        </div>
    </div>

    <!-- Slide 2: Standard -->
    <div class="slide slide-standard" id="slide-2">
        <div class="big-number">02</div>
        <div class="slide-title">結論！</div>
        <div class="highlight-text">
            自宅のネットを変え<br>られない人は<br>
            <span class="red">大損するかも！</span>
        </div>
        <div
            style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 0;">
            <img src="public/images/irasutoya/internet_modem_router.png" alt="ルーター" class="replaced">
        </div>
    </div>

    <!-- Slide 3: Standard -->
    <div class="slide slide-standard" id="slide-3">
        <div class="big-number">03</div>
        <div class="slide-title">メリット＆デメリット</div>
        <div class="highlight-text">
            <span class="blue">爆速</span>で店舗サポートあり！<br>
            でも割引がないと<span class="red">割高</span>...
        </div>
        <div
            style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 0;">
            <img src="public/images/charts/Y!mobile.png" alt="レーダーチャート" class="replaced">
        </div>
    </div>

    <!-- Slide 4: Standard -->
    <div class="slide slide-standard" id="slide-4">
        <div class="big-number">04</div>
        <div class="slide-title">高くて微妙？</div>
        <div class="highlight-text">
            割引がないと・・・
        </div>
        <div style="display: flex; justify-content: center; margin: 10px 0 20px;">
            <img src="public/images/irasutoya/businessman2_kangaechu.png" alt="悩む男性" style="max-height: 250px;">
        </div>
        <div
            style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 0;">
            <img src="public/images/temp/ワイモバ_割引前料金表.png" alt="割引前料金表" class="replaced">
        </div>
    </div>

    <!-- Slide 5: Standard -->
    <div class="slide slide-standard" id="slide-5">
        <div class="big-number">05</div>
        <div class="slide-title">おうち割 光セット</div>
        <div class="highlight-text">
            ネットをまとめれば<br>
            一気に<span class="blue">最安クラス！</span>
        </div>
        <div
            style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 0;">
            <img src="public/images/temp/ワイモバ_割引後料金表.png" alt="割引後料金表" class="replaced"
                style="transform: scale(1.1); transform-origin: center top; margin-top: 30px;">
        </div>
    </div>

    <!-- Slide 6: Standard -->
    <div class="slide slide-standard" id="slide-6">
        <div class="big-number">06</div>
        <div class="slide-title">ネット回線が鍵</div>
        <div class="highlight-text">
            お家のネット回線を<br>合わせるのがコツ！
        </div>
        <div
            style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 0;">
            <img src="public/images/temp/ソフトバンク光とワイモバイルを使用しているイラスト.png" alt="イラスト" class="replaced">
        </div>
    </div>

    <!-- Slide 7: Standard -->
    <div class="slide slide-standard" id="slide-7">
        <div class="big-number">07</div>
        <div class="slide-title">おすすめな人</div>
        <div class="highlight-text">
            <span class="blue">ソフトバンク光</span>や<br>
            <span class="red">PayPay</span>ユーザーに最強！
        </div>
        <div
            style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 0;">
            <img src="public/images/temp/PayPayユーザーも必見.png" alt="PayPay" class="replaced">
        </div>
    </div>

    <!-- Slide 8: Standard -->
    <div class="slide slide-standard" id="slide-8">
        <div class="big-number">08</div>
        <div class="slide-title">環境チェック</div>
        <div class="highlight-text">
            自分の環境に合うか<br>
            チェックが必要！
        </div>
        <div
            style="flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; min-height: 0;">
            <img src="public/images/irasutoya/pose_yubisashi_kakunin_businesswoman.png" alt="納得する女性" class="replaced">
        </div>
    </div>

    <!-- Slide 9: Warning (Penultimate) -->
    <div class="slide slide-warning" id="slide-9">
        <div class="warning-box">
            <div class="warning-title">初期費用が黒字!?</div>
            <div class="warning-text">
                さらに初期費用を<br>
                <span style="color:red; font-size:95px; font-weight:900;">黒字にする裏技</span><br>
                がある！
            </div>
        </div>
        <div
            style="margin-top: 25px; flex-grow: 1; display: flex; justify-content: center; align-items: center; margin-bottom: 5px; min-height: 0;">
            <img src="public/images/irasutoya/osatsu_money_yamadumi.png" alt="札束" class="replaced">
        </div>
    </div>

    <!-- Slide 10: CTA Slide -->
    <div class="slide slide-cta" id="slide-10">
        <div class="cta-title">本編で解説！</div>
        <div class="cta-text">
            絶対に損しない他社比較や<br>裏技の詳細は本編で！
        </div>
        <div class="arrow-down">⬇️</div>
        <div style="display: flex; justify-content: center; align-items: center; height: 450px; width: 85%;">
            <img src="public/images/thumbnails/あなたの家のネットはどこの回線？ワイモバイルでスマホ代が劇的に安くなる人の特徴とは？.png" alt="サムネイル"
                class="replaced" style="border: 12px solid var(--white); border-radius: 20px;">
        </div>
    </div>

</body>

</html>
