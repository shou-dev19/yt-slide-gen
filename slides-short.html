<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Slides - Docomo Quality Down</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #0052cc;
            --white: #ffffff;
            --red: #e63946;
            --text-dark: #1a1a1a;
            --bg-outside: #f0f4f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-outside);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }

        .slide-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--white);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin-bottom: 60px;
        }

        /* Common Elements */
        .watermark {
            position: absolute;
            top: -40px;
            left: 20px;
            font-size: 280px;
            font-weight: 900;
            color: var(--blue);
            opacity: 0.07;
            z-index: 1;
        }

        .slide-title {
            font-size: 62px;
            font-weight: 900;
            color: var(--blue);
            border-bottom: 10px solid var(--blue);
            margin: 80px 60px 40px;
            padding-bottom: 10px;
            align-self: flex-start;
            z-index: 2;
        }

        .slide-body {
            flex: 1;
            padding: 0 60px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 2;
        }

        .slide-illust {
            position: absolute;
            right: 40px;
            bottom: 40px;
            z-index: 5;
        }

        img {
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        /* Slide 1: Thumbnail */
        .slide-thumbnail {
            background: repeating-radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f7ff 10%, #e6f0ff 20%);
            border: 25px solid var(--blue);
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .thumb-tag {
            background-color: var(--red);
            color: var(--white);
            font-size: 70px;
            font-weight: 900;
            padding: 14px 46px;
            transform: rotate(-3deg);
            box-shadow: 6px 6px 0 #000;
            margin-bottom: 40px;
        }

        .thumb-main-title {
            font-size: 90px;
            font-weight: 900;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 40px;
            max-width: 900px;
        }

        .thumb-sub-band {
            background-color: var(--blue);
            color: var(--white);
            font-size: 56px;
            font-weight: 700;
            padding: 14px 60px;
            border-radius: 10px;
        }

        /* Slide Body Elements */
        .list-item {
            font-size: 52px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .emoji {
            font-size: 60px;
        }

        /* Ranking Styles */
        .ranking-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            gap: 30px;
            background: #f8faff;
            padding: 20px 40px;
            border-radius: 20px;
            border-left: 15px solid var(--blue);
        }

        .rank-badge {
            font-size: 50px;
            min-width: 80px;
        }

        .rank-logo {
            height: 80px;
            width: 250px;
            object-fit: contain;
        }

        .rank-text {
            font-size: 48px;
            font-weight: 700;
        }

        .rank-worst {
            color: var(--red);
            font-weight: 900;
        }

        /* Recommendation Styles */
        .recommend-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .recommend-card {
            background: #fff;
            border: 5px solid #eef2f7;
            border-radius: 25px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card-logo {
            height: 90px;
            width: 100%;
        }

        .card-desc {
            font-size: 38px;
            font-weight: 700;
            color: var(--blue);
            text-align: center;
        }

        /* Warning Slide */
        .slide-warning {
            background-color: #fff8f8;
        }

        .warning-banner {
            width: 100%;
            background-color: var(--red);
            color: var(--white);
            font-size: 62px;
            font-weight: 900;
            text-align: center;
            padding: 22px 0;
            margin-top: 100px;
        }

        .warning-box {
            margin: 60px;
            border: 10px solid var(--red);
            background-color: #fff0f0;
            padding: 40px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .w-title {
            font-size: 54px;
            font-weight: 900;
            color: var(--red);
            text-align: center;
            margin-bottom: 10px;
        }

        .w-item {
            font-size: 44px;
            font-weight: 700;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        /* CTA Slide */
        .slide-cta {
            background: linear-gradient(135deg, #0052cc, #003380);
            color: var(--white);
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .cta-title {
            font-size: 84px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .cta-sub {
            font-size: 50px;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .cta-arrow {
            font-size: 90px;
            color: #ffd700;
            animation: bounce 1.5s infinite;
            margin-bottom: 30px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        .cta-banner-img {
            width: 940px;
            border: 8px solid var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <!-- Slide 1: Thumbnail -->
    <div class="slide-container slide-thumbnail">
        <div class="thumb-tag">最下位！</div>
        <h1 class="thumb-main-title">ドコモの通信品質が<br>4キャリア中最下位</h1>
        <div class="thumb-sub-band">乗り換え先4選</div>
        <div class="slide-illust">
            <img src="public/images/irasutoya/bikkuri_me_tobideru_man.png" height="290" alt="驚く男性">
        </div>
    </div>

    <!-- Slide 2: Explanation -->
    <div class="slide-container">
        <div class="watermark">2</div>
        <h2 class="slide-title">Opensignal最新レポート</h2>
        <div class="slide-body">
            <div class="list-item">
                <span class="emoji">📊</span> 「一貫した品質」部門
            </div>
            <div class="list-item">
                <span class="emoji">⚡</span> ドコモが4キャリア中最下位
            </div>
            <div class="list-item">
                <span class="emoji">📅</span> 2026年4月版レポート
            </div>
        </div>
        <div class="slide-illust">
            <img src="public/images/irasutoya/animal_buta_shock.png" height="260" alt="ショックを受ける豚">
        </div>
    </div>

    <!-- Slide 3: Ranking -->
    <div class="slide-container">
        <div class="watermark">3</div>
        <h2 class="slide-title">通信品質ランキング</h2>
        <div class="slide-body">
            <div class="ranking-container">
                <div class="rank-item">
                    <span class="rank-badge">🥇</span>
                    <img src="public/images/logo/au_logo.png" class="rank-logo" alt="au">
                </div>
                <div class="rank-item">
                    <span class="rank-badge">🥈</span>
                    <img src="public/images/logo/Softbank_logo.png" class="rank-logo" alt="SoftBank">
                </div>
                <div class="rank-item">
                    <span class="rank-badge">🥈</span>
                    <img src="public/images/logo/Rakuten_Mobile_logo.svg" class="rank-logo" alt="Rakuten">
                </div>
                <div class="rank-item" style="border-left-color: var(--red);">
                    <span class="rank-badge">🥉</span>
                    <img src="public/images/logo/docomo_logo.png" class="rank-logo" alt="docomo">
                    <span class="rank-text rank-worst">最下位</span>
                </div>
            </div>
        </div>
        <div class="slide-illust">
            <img src="public/images/irasutoya/seikyuusyo_shock.png" height="260" alt="請求書に驚く">
        </div>
    </div>

    <!-- Slide 4: Recommendations -->
    <div class="slide-container">
        <div class="watermark">4</div>
        <h2 class="slide-title">おすすめ乗り換え先4選</h2>
        <div class="slide-body" style="margin-bottom: 120px;">
            <div class="recommend-grid">
                <div class="recommend-card">
                    <img src="public/images/logo/Mineo_logo_背景削除.png" class="card-logo" alt="mineo">
                    <div class="card-desc">月660円〜</div>
                </div>
                <div class="recommend-card">
                    <img src="public/images/logo/Povo_logo_背景透過.png" class="card-logo" alt="povo2.0">
                    <div class="card-desc">月0円〜</div>
                </div>
                <div class="recommend-card">
                    <img src="public/images/logo/LINEMO_logo.svg" class="card-logo" alt="LINEMO">
                    <div class="card-desc">LINE使い放題</div>
                </div>
                <div class="recommend-card">
                    <img src="public/images/logo/Rakuten_Mobile_logo.svg" class="card-logo" alt="楽天モバイル">
                    <div class="card-desc">通話無料</div>
                </div>
            </div>
        </div>
        <div class="slide-illust" style="z-index: 10;">
            <img src="public/images/irasutoya/pose_anshin_woman.png" height="260" alt="安心する女性">
        </div>
    </div>

    <!-- Slide 5: Warning -->
    <div class="slide-container slide-warning">
        <div class="warning-banner">⚠️ ご注意ください</div>
        <div class="warning-box">
            <h3 class="w-title">プランは変更になる場合があります</h3>
            <div class="w-item">📋 掲載情報は投稿時点のもの</div>
            <div class="w-item">🔍 契約前に公式サイトをご確認ください</div>
        </div>
        <div class="slide-illust">
            <img src="public/images/irasutoya/mark_chuui.png" height="280" alt="注意マーク">
        </div>
    </div>

    <!-- Slide 6: CTA -->
    <div class="slide-container slide-cta">
        <h2 class="cta-title">本編動画をチェック！</h2>
        <p class="cta-sub">チャンネル登録もよろしくね！</p>
        <div class="cta-arrow">▼</div>
        <img src="public/images/thumbnails/【2026年最新】ドコモの通信品質が4キャリア中最下位。乗り換え先4社を比較_サムネ3-2.png" class="cta-banner-img" alt="動画サムネイル">
    </div>

</body>
</html>
