<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Slides</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Noto+Sans+JP:wght@700;900&family=Noto+Color+Emoji&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue: #0052cc;
            --white: #ffffff;
            --red: #e63946;
            --bg-outer: #f0f4f8;
            --bg-slide: #ffffff;
            --yellow: #ffe600;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-outer);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            font-family: 'Inter', 'Noto Sans JP', 'Noto Color Emoji', sans-serif;
            font-weight: 900;
        }

        .slide {
            width: 1080px;
            height: 1080px;
            background-color: var(--bg-slide);
            box-sizing: border-box;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        /* Typography */
        .text-massive {
            font-size: 120px;
            line-height: 1.1;
        }

        .text-huge {
            font-size: 90px;
            line-height: 1.2;
        }

        .text-large {
            font-size: 70px;
            line-height: 1.3;
        }

        .blue {
            color: var(--blue);
        }

        .red {
            color: var(--red);
        }

        .yellow {
            color: var(--yellow);
        }

        .white {
            color: var(--white);
        }

        /* A. Thumbnail Slide */
        .slide-thumbnail {
            background: repeating-radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f7ff 10%, #e6f0ff 20%);
            border: 25px solid var(--blue);
            align-items: center;
            justify-content: space-between;
            padding: 80px 40px;
        }

        .logo-area {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 140px;
            color: var(--blue);
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
        }

        .catchphrase {
            transform: rotate(-3deg);
            text-align: center;
            text-shadow: 6px 6px 0px rgba(0, 0, 0, 0.2);
            background-color: var(--yellow);
            padding: 20px 60px;
            border-radius: 20px;
            border: 10px solid #000;
            margin: 40px 0;
            color: #000;
        }

        /* B. Standard Explanations */
        .slide-standard {
            padding: 80px;
            justify-content: flex-start;
        }

        .big-number {
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 400px;
            color: var(--blue);
            opacity: 0.1;
            z-index: 0;
            line-height: 1;
        }

        .slide-content {
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .slide-title {
            font-size: 80px;
            border-bottom: 15px solid var(--blue);
            padding-bottom: 20px;
            margin-bottom: 60px;
            text-align: center;
        }

        .highlight-text {
            font-size: 70px;
            text-align: center;
            margin-top: 40px;
            line-height: 1.4;
        }

        .highlight-text span.massive-metric {
            font-size: 130px;
            display: inline-block;
            margin: 0 10px;
        }

        /* C. Warning Slide */
        .slide-warning {
            background-color: #fff0f0;
            border: 30px solid var(--red);
            padding: 80px;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .warning-box {
            border: 15px solid var(--red);
            background-color: #ffffff;
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(230, 57, 70, 0.3);
            width: 100%;
            box-sizing: border-box;
        }

        /* D. CTA Slide */
        .slide-cta {
            background: linear-gradient(135deg, #0052cc, #003380);
            padding: 100px 80px;
            align-items: center;
            justify-content: space-between;
            color: white;
            text-align: center;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-40px);
            }

            60% {
                transform: translateY(-20px);
            }
        }

        .floating-arrow {
            font-size: 120px;
            animation: bounce 2s infinite;
            color: var(--yellow);
            margin: 40px 0;
        }

        /* Placeholders */
        .img-placeholder {
            background-color: #e6f0ff;
            border: 8px dashed var(--blue);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            margin-top: 40px;
            font-size: 50px;
            color: var(--blue);
            text-align: center;
            padding: 40px;
            min-height: 300px;
        }

        .cta-thumbnail {
            background-color: rgba(255, 255, 255, 0.1);
            border: 15px solid var(--white);
            color: var(--white);
            height: 450px;
            width: 100%;
        }

        .warning-placeholder {
            border-color: var(--red);
            background-color: #ffe6e6;
            color: var(--red);
        }

        .thumbnail-illustration {
            width: 100%;
            height: 400px;
            border: none;
            background: transparent;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.2));
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 200px;
        }
    </style>
</head>

<body>

    <!-- S1: Thumbnail Slide -->
    <div class="slide slide-thumbnail" id="slide-1" style="justify-content: center; gap: 60px;">
        <div class="logo-area" style="flex-direction: column; height: auto; gap: 60px;">
            <img src="./public/images/logo/Mineo_logo_背景削除.png" alt="mineoロゴ"
                style="height: 280px; object-fit: contain;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <img src="./public/images/temp/パケット放題3Mbps_image.png" alt="パケット放題3Mbps"
                    style="width: 950px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3);">
                <div style="font-size: 32px; color: var(--blue); opacity: 0.8; font-weight: bold;">mineo公式ブログから引用</div>
            </div>
        </div>
    </div>

    <!-- S2: Standard Slide -->
    <div class="slide slide-standard" id="slide-2">
        <div class="big-number">02</div>
        <div class="slide-content">
            <div class="slide-title">3/10スタート！</div>
            <div class="highlight-text">
                パケット放題<br>
                <span class="massive-metric blue">3</span><span class="blue text-huge">Mbps</span>
            </div>
            <img src="./public/images/irasutoya/yajirushi_fast_.png" alt="スピードメーター"
                style="height: 400px; object-fit: contain; margin-top: 40px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- S3: Standard Slide -->
    <div class="slide slide-standard" id="slide-3">
        <div class="big-number">03</div>
        <div class="slide-content">
            <div class="slide-title">動画も快適！</div>
            <div class="highlight-text">
                料金そのままで<br>
                速度<span class="massive-metric red">2</span><span class="red text-huge">倍?!</span>
            </div>
            <img src="./public/images/temp/point_icon_04.png" alt="動画再生"
                style="height: 400px; object-fit: contain; margin-top: 40px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- S4: Standard Slide -->
    <div class="slide slide-standard" id="slide-4">
        <div class="big-number">04</div>
        <div class="slide-content">
            <div class="slide-title">15GB以上なら</div>
            <div class="highlight-text">
                オプション料金<br>
                <span class="massive-metric red">0</span><span class="red text-huge">円!</span>
            </div>
            <img src="./public/images/irasutoya/present_open.png" alt="プレゼントの箱"
                style="height: 400px; object-fit: contain; margin-top: 40px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- S5: Warning Slide -->
    <div class="slide slide-warning" id="slide-5">
        <div class="warning-box">
            <div class="text-massive red" style="margin-bottom: 40px;">⚠️注意⚠️</div>
            <div class="text-huge">
                使いすぎると<br>速度制限!?
            </div>
            <img src="./public/images/irasutoya/wifi_speed_slow_l.png" alt="通信制限"
                style="height: 350px; object-fit: contain; margin-top: 40px; filter: drop-shadow(0 10px 20px rgba(230,57,70,0.2)); display: block; margin-left: auto; margin-right: auto;">
        </div>
    </div>

    <!-- S6: Standard Slide -->
    <div class="slide slide-standard" id="slide-6">
        <div class="big-number">06</div>
        <div class="slide-content">
            <div class="slide-title">制限中も安心！</div>
            <div class="highlight-text">
                スイッチ<span class="massive-metric blue">OFF</span>で<br>高速通信OK！
            </div>
            <img src="./public/images/irasutoya/smartphone_speed_5g.png" alt="スイッチのON/OFF"
                style="height: 500px; object-fit: contain; margin-top: 20px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- S7: Standard Slide -->
    <div class="slide slide-standard" id="slide-7">
        <div class="big-number">07</div>
        <div class="slide-content">
            <div class="slide-title">賢く使い分け！</div>
            <ul style="list-style-type: '✅ '; font-size: 60px; line-height: 1.5; margin-top: 40px; padding-left: 60px;">
                <li>普段は <span class="blue">ON</span></li>
                <li>必要な時だけ <span class="red">OFF</span></li>
            </ul>
            <img src="./public/images/irasutoya/smartphone_nidaimochi_man.png" alt="スマホの使い分け"
                style="height: 400px; object-fit: contain; margin-top: 40px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- S8: Standard Slide (Penultimate) -->
    <div class="slide slide-standard" id="slide-8">
        <div class="big-number">08</div>
        <div class="slide-content">
            <div class="slide-title">mineoなら…</div>
            <div class="highlight-text" style="font-size: 90px; margin-top: 50px;">
                <span class="blue">ちょうどいい</span><br>
                <span class="red" style="font-size: 140px;">使い放題！</span>
            </div>
            <img src="./public/images/irasutoya/internet_kanki_woman1.png" alt="うれしい女性"
                style="height: 400px; object-fit: contain; margin-top: 20px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        </div>
    </div>

    <!-- S9: CTA Slide -->
    <div class="slide slide-cta" id="slide-9" style="padding: 60px 80px; justify-content: center; gap: 20px;">
        <div class="text-huge yellow" style="text-shadow: 0 10px 20px rgba(0,0,0,0.3); font-size: 100px;">
            動画で詳しく解説！
        </div>
        <div class="floating-arrow" style="margin: 10px 0; font-size: 100px;">⬇️</div>
        <div class="text-large yellow" style="margin-bottom: 20px; font-size: 70px;">
            画面下のリンクを<br>クリック！
        </div>
        <img src="./public/images/thumbnails/【裏技】mineo歴8年が教える「実質使い放題」の極意！契約前に知らないと損する5つの節約術_サムネ.png" alt="本編動画サムネイル"
            style="width: 90%; height: auto; border: 12px solid var(--white); border-radius: 20px; box-sizing: border-box; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));">
    </div>

</body>

</html>
