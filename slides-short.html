<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUROモバイル Shorts Slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Noto+Sans+JP:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            font-weight: 900;
        }

        .slide {
            width: 1080px;
            height: 1080px;
            background-color: #ffffff;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* Thumbnail Slide 1 */
        .thumbnail-slide {
            background: repeating-radial-gradient(circle at 50% 50%, #ffffff 0%, #f0f7ff 10%, #e6f0ff 20%);
            border: 25px solid #0052cc;
            align-items: center;
            justify-content: flex-start;
        }

        .thumbnail-logo {
            width: 100%;
            height: 180px;
            margin-top: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .thumbnail-catchphrase {
            transform: rotate(-3deg);
            background-color: #e63946;
            color: #ffffff;
            font-size: 80px;
            padding: 20px 40px;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.2);
            margin-top: 40px;
            line-height: 1.3;
            z-index: 10;
        }

        .thumbnail-catchphrase .yellow {
            color: #ffe600;
        }

        .thumbnail-image {
            margin-top: auto;
            margin-bottom: -10px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 5;
        }

        /* Standard Slide 2-5 */
        .standard-slide {
            padding: 80px;
        }

        .big-number {
            position: absolute;
            top: 20px;
            left: 40px;
            font-size: 250px;
            color: #0052cc;
            opacity: 0.1;
            font-weight: 900;
            z-index: 1;
            line-height: 1;
        }

        .slide-title {
            font-size: 75px;
            color: #333333;
            border-bottom: 15px solid #0052cc;
            padding-bottom: 20px;
            margin-top: 40px;
            margin-bottom: 60px;
            z-index: 2;
            position: relative;
            line-height: 1.4;
            display: inline-block;
            align-self: flex-start;
        }

        .highlight-text {
            font-size: 60px;
            z-index: 2;
            position: relative;
            line-height: 1.6;
            width: 100%;
        }

        .highlight-text .blue {
            color: #0052cc;
            font-size: 130px;
            line-height: 1;
        }

        .highlight-text .red {
            color: #e63946;
            font-size: 130px;
            line-height: 1;
        }

        .list-item {
            font-size: 70px;
            margin-top: 30px;
            display: flex;
            align-items: center;
        }

        .list-item span.emoji {
            margin-right: 30px;
            font-size: 90px;
        }

        /* Warning Slide 6 */
        .warning-slide {
            background-color: #fff0f0;
            border: 25px solid #e63946;
            padding: 80px;
            justify-content: center;
            align-items: center;
        }

        .warning-title {
            font-size: 100px;
            color: #e63946;
            margin-bottom: 60px;
            text-align: center;
            font-weight: 900;
        }

        .warning-box {
            background-color: #ffffff;
            border: 15px solid #e63946;
            padding: 60px;
            width: 100%;
            text-align: center;
            font-size: 70px;
            font-weight: 900;
            box-sizing: border-box;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.1);
        }

        /* CTA Slide 7 */
        .cta-slide {
            background: linear-gradient(135deg, #0052cc, #003380);
            padding: 80px;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .cta-text {
            font-size: 110px;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            font-weight: 900;
        }

        .cta-arrow {
            font-size: 150px;
            animation: bounce 2s infinite;
            margin-bottom: 20px;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-30px);
            }

            60% {
                transform: translateY(-15px);
            }
        }

        /* Placeholders */
        .placeholder {
            background-color: #e6f0ff;
            border: 8px dashed #0052cc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            color: #0052cc;
            text-align: center;
            box-sizing: border-box;
            padding: 20px;
            font-weight: 700;
        }

        .placeholder-logo {
            width: 800px;
            height: 180px;
        }

        .placeholder-image {
            width: 600px;
            height: 600px;
            border-radius: 50%;
            border-width: 15px;
            background-color: #ffffff;
        }

        .placeholder-cta {
            width: 850px;
            height: 480px;
            border: 15px solid #00ce00;
            /* Distinct border to look like thumbnail wrapper */
            background-color: #ffffff;
            border-style: solid;
            color: #333;
        }

        /* Flex utilities */
        .flex-col {
            display: flex;
            flex-direction: column;
        }

        .flex-row {
            display: flex;
            flex-direction: row;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- Slide 1: Thumbnail -->
    <div class="slide thumbnail-slide">
        <div class="thumbnail-logo">
            <img src="public/images/logo/nuromobile_logo.png" alt="NUROモバイル ロゴ"
                style="width: 800px; height: 180px; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));">
        </div>
        <div class="thumbnail-catchphrase">
            【2026年最新】<br>NUROモバイルの<br><span class="yellow">評判は？</span>
        </div>
        <div class="thumbnail-image">
            <img src="public/images/irasutoya/businessman2_kangaechu.png" alt="考えるビジネスマン"
                style="width: 300px; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); z-index: 5;">
        </div>
    </div>

    <!-- Slide 2 -->
    <div class="slide standard-slide flex-col">
        <div class="big-number">01</div>
        <div class="slide-title">結論</div>
        <div class="highlight-text center flex-col" style="flex:1;">
            <div style="font-size: 70px; margin-bottom: 60px;">店舗サポート不要なら</div>
            <div class="red" style="font-size: 140px;">コスパ最強！</div>
            <img src="public/images/irasutoya/internet_kanki_woman1.png" alt="歓喜する女性"
                style="width: 450px; margin-top: 40px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); z-index: 5;">
        </div>
    </div>

    <!-- Slide 3 -->
    <div class="slide standard-slide flex-col">
        <div class="big-number">02</div>
        <div class="slide-title">圧倒的安さ</div>
        <div class="highlight-text center flex-col" style="flex:1; text-align: center; position: relative;">
            <div>
                <span class="blue" style="font-size: 150px;">3</span><span style="font-size: 100px;">GB</span>
            </div>
            <div
                style="margin-top: 20px; margin-bottom: 20px; font-size: 80px; font-weight: 900; background-color: #ffe600; display: inline-block; padding: 10px 40px; transform: rotate(-2deg); box-shadow: 5px 5px 0px rgba(0,0,0,0.2);">
                たったの
            </div>
            <div>
                <span class="red" style="font-size: 180px;">792</span><span style="font-size: 100px;">円</span>
            </div>
            <img src="public/images/irasutoya/osatsu_money_yamadumi.png" alt="お金"
                style="position: absolute; bottom: -20px; right: -20px; width: 400px; opacity: 0.9; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); z-index: -1;">
        </div>
    </div>

    <!-- Slide 4 -->
    <div class="slide standard-slide flex-col">
        <div class="big-number">03</div>
        <div class="slide-title">対象SNS</div>
        <div class="highlight-text flex-col" style="flex:1; justify-content: center; padding-left: 100px;">
            <div class="list-item"><i class="fa-brands fa-line"
                    style="color:#06C755; margin-right: 30px; font-size: 80px;"></i>LINE</div>
            <div class="list-item"><i class="fa-brands fa-x-twitter"
                    style="color:black; margin-right: 30px; font-size: 80px;"></i>X (旧Twitter)</div>
            <div class="list-item"><i class="fa-brands fa-instagram"
                    style="color:#E1306C; margin-right: 30px; font-size: 80px;"></i>Instagram</div>
            <div class="list-item"><i class="fa-brands fa-tiktok"
                    style="color:black; margin-right: 30px; font-size: 80px;"></i>TikTok</div>
            <div
                style="margin-top: 10px; font-size: 80px; color: #e63946; font-weight: 900; text-align: left; line-height: 1.2;">
                使い放題！<br>通信量タダ！</div>
        </div>
    </div>

    <!-- Slide 5 -->
    <div class="slide standard-slide flex-col">
        <div class="big-number">04</div>
        <div class="slide-title">トリプルキャリア対応</div>
        <div class="highlight-text center flex-col" style="flex:1; text-align: center;">
            <div class="flex-row" style="gap: 40px; margin-bottom: 80px; justify-content: center; align-items: center;">
                <img src="public/images/logo/docomo_logo.png" alt="ドコモ"
                    style="width: 250px; height: 120px; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); border-radius: 20px; background-color: #fff; padding: 10px;">
                <img src="public/images/logo/au_logo.png" alt="au"
                    style="width: 250px; height: 120px; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); border-radius: 20px; background-color: #fff; padding: 10px;">
                <img src="public/images/logo/softbank_logo.png" alt="ソフトバンク"
                    style="width: 250px; height: 120px; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); border-radius: 20px; background-color: #fff; padding: 10px;">
            </div>
            <div style="font-size: 70px; line-height: 1.5;">
                好きな回線を選べるから<br><span class="blue">安心！</span>
            </div>
        </div>
    </div>

    <!-- Slide 6 -->
    <div class="slide warning-slide flex-col">
        <div class="warning-title">⚠️ デメリット</div>
        <img src="public/images/irasutoya/pose_atama_kakaeru_woman.png" alt="ショックを受ける女性"
            style="width: 450px; height: 300px; object-fit: contain; margin-bottom: 30px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
        <div class="warning-box">
            お昼の<br><span style="color: #e63946; font-size: 90px;">通信速度低下</span><br>に注意！
        </div>
    </div>

    <!-- Slide 7 -->
    <div class="slide cta-slide flex-col">
        <div class="cta-text">詳しくは<br>本編で解説！</div>
        <div class="cta-arrow">⬇️</div>
        <img src="public/images/thumbnails/【月額792円〜】SNS使い放題＆初期費用実質0円！NUROモバイルのメリット6選を徹底解説.png" alt="YouTubeサムネイル"
            class="placeholder-cta" style="object-fit: cover; padding: 0; box-sizing: border-box;">
    </div>

</body>

</html>
